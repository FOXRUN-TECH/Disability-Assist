name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the details below.
        **Security vulnerabilities** must NOT be reported here. See [SECURITY.md](../../SECURITY.md).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Device Runtime
        - Cloud STT
        - Cloud LLM / Intent Engine
        - Cloud TTS
        - Policy / Safety Layer
        - Smart-Home Integration
        - Caregiver App
        - Consent / Privacy
        - Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low (cosmetic or minor inconvenience)
        - Medium (feature impaired but workaround exists)
        - High (feature broken, no workaround)
        - Critical (safety, privacy, or consent violation)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, hardware, etc.
      placeholder: |
        OS: Windows 11 / Ubuntu 22.04 / Raspberry Pi OS
        Python: 3.11.x
        Hardware: RPi5 / Desktop
