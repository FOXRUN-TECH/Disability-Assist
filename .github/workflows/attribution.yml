name: Attribution

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-contributors:
    name: Update Contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update CONTRIBUTORS.md
        run: python scripts/update-contributors.py

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: update contributor attribution"
          title: "docs: update contributor attribution"
          body: |
            Automated update of CONTRIBUTORS.md from git history.

            This PR was created automatically by the Attribution workflow.
          branch: auto/update-contributors
          delete-branch: true
          labels: documentation
